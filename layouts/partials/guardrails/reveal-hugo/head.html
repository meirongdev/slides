<!--
  Guardrails deck only (reveal-hugo injects this for section "guardrails").
  This deck is code/table-heavy; reveal.js renders each slide in a fixed
  960x700 box, so tall slides overflowed and the bottom was clipped.
  Pair with `center = false` in this deck's _index.md front matter:
  top-align the content, shrink the densest elements to fit, and add a
  scroll safety net so nothing is ever cut off.
-->
<style>
  /* Top-align every slide and never let content spill past the slide box. */
  .reveal .slides > section,
  .reveal .slides > section > section {
    max-height: 100%;
    overflow-y: auto;       /* scroll fallback if a slide is still too tall */
    padding: 8px 26px;
    box-sizing: border-box;
  }

  /* Smaller base type so list-heavy slides fit the 700px height. */
  .reveal { font-size: 30px; }
  .reveal h1 { font-size: 1.7em; }
  .reveal h2 { font-size: 1.3em; }
  .reveal h3 { font-size: 1.1em; }
  .reveal h1, .reveal h2, .reveal h3 { line-height: 1.1; margin-bottom: 0.45em; }

  .reveal p { margin: 0.4em 0; line-height: 1.3; }
  .reveal ul, .reveal ol { margin: 0.35em 0; }
  .reveal li { margin: 0.12em 0; line-height: 1.3; }

  /* Code blocks and tables are the densest content — shrink them the most. */
  .reveal pre { width: 100%; margin: 0.5em 0; box-shadow: none; }
  .reveal pre code { font-size: 0.62em; line-height: 1.3; max-height: none; padding: 0.7em 0.9em; }
  .reveal table { font-size: 0.6em; margin: 0.4em auto; }
  .reveal table th, .reveal table td { padding: 0.18em 0.5em; }

  .reveal blockquote { width: auto; margin: 0.5em 0; font-size: 0.85em; }
</style>
